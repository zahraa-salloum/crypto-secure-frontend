@if (isOpen) {
  <div class="dialog-overlay" @fadeIn (click)="onOverlayClick()">
    <div class="dialog-container" @slideIn (click)="$event.stopPropagation()">
      <div class="dialog-header" [class]="'dialog-header-' + config?.type">
        <div class="dialog-icon">
          @switch (config?.type) {
            @case ('warning') {
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                <path fill-rule="evenodd" d="M9.401 3.003c1.155-2 4.043-2 5.197 0l7.355 12.748c1.154 2-.29 4.5-2.599 4.5H4.645c-2.309 0-3.752-2.5-2.598-4.5L9.4 3.003zM12 8.25a.75.75 0 01.75.75v3.75a.75.75 0 01-1.5 0V9a.75.75 0 01.75-.75zm0 8.25a.75.75 0 100-1.5.75.75 0 000 1.5z" clip-rule="evenodd" />
              </svg>
            }
            @case ('danger') {
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                <path fill-rule="evenodd" d="M12 2.25c-5.385 0-9.75 4.365-9.75 9.75s4.365 9.75 9.75 9.75 9.75-4.365 9.75-9.75S17.385 2.25 12 2.25zm-1.72 6.97a.75.75 0 10-1.06 1.06L10.94 12l-1.72 1.72a.75.75 0 101.06 1.06L12 13.06l1.72 1.72a.75.75 0 101.06-1.06L13.06 12l1.72-1.72a.75.75 0 10-1.06-1.06L12 10.94l-1.72-1.72z" clip-rule="evenodd" />
              </svg>
            }
            @case ('prompt') {
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                <path fill-rule="evenodd" d="M12 1.5a5.25 5.25 0 00-5.25 5.25v3a3 3 0 00-3 3v6.75a3 3 0 003 3h10.5a3 3 0 003-3v-6.75a3 3 0 00-3-3v-3c0-2.9-2.35-5.25-5.25-5.25zm3.75 8.25v-3a3.75 3.75 0 10-7.5 0v3h7.5z" clip-rule="evenodd" />
              </svg>
            }
            @default {
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                <path fill-rule="evenodd" d="M2.25 12c0-5.385 4.365-9.75 9.75-9.75s9.75 4.365 9.75 9.75-4.365 9.75-9.75 9.75S2.25 17.385 2.25 12zm8.706-1.442c1.146-.573 2.437.463 2.126 1.706l-.709 2.836.042-.02a.75.75 0 01.67 1.34l-.04.022c-1.147.573-2.438-.463-2.127-1.706l.71-2.836-.042.02a.75.75 0 11-.671-1.34l.041-.022zM12 9a.75.75 0 100-1.5.75.75 0 000 1.5z" clip-rule="evenodd" />
              </svg>
            }
          }
        </div>
        <h3>{{ config?.title }}</h3>
      </div>
      
      <div class="dialog-body">
        <p>{{ config?.message }}</p>
        @if (config?.type === 'prompt') {
          <input
            type="text"
            class="dialog-input"
            [(ngModel)]="inputValue"
            [placeholder]="config?.inputPlaceholder || ''"
            (keydown.enter)="onConfirm()"
            autofocus
          />
        }
      </div>
      
      <div class="dialog-footer">
        <button
          class="btn btn-outline"
          (click)="onCancel()"
          type="button"
        >
          {{ config?.cancelText }}
        </button>
        <button
          [class]="'btn ' + getConfirmButtonClass()"
          (click)="onConfirm()"
          type="button"
        >
          {{ config?.confirmText }}
        </button>
      </div>
    </div>
  </div>
}
